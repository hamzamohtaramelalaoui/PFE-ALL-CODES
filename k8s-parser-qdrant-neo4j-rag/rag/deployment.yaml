apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-workflow
  namespace: mcp-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-workflow
  template:
    metadata:
      labels:
        app: rag-workflow
    spec:
      containers:
        - name: rag-workflow
          image: hamzamohtaramelalaou/rag-builder:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: rag-workflow-config
            - secretRef:
                name: rag-workflow-secret
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
