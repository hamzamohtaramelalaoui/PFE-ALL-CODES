apiVersion: apps/v1
kind: Deployment
metadata:
  name: wazuh-dashboard
  namespace: wazuh
spec:
  template:
    spec:
      volumes:
        - name: dashboard-wazuh-config
          secret:
            secretName: dashboard-wazuh-config
      containers:
        - name: wazuh-dashboard
          volumeMounts:
            - name: dashboard-wazuh-config
              mountPath: /usr/share/wazuh-dashboard/data/wazuh/config/wazuh.yml
              subPath: wazuh.yml
              readOnly: true
          env:
            - name: WAZUH_API_URL
              value: https://wazuh
