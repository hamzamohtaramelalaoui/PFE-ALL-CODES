      tags: [host, package_management, command_monitoring]

    - rule: Kubernetes Sensitive File Access
      desc: Kubernetes sensitive config or credential file accessed by unexpected process
      condition: >
        open_read
        and (fd.name startswith /etc/kubernetes
             or fd.name contains /.kube/config
             or fd.name contains /var/lib/kubelet/pki
             or fd.name contains /var/run/secrets/kubernetes.io/serviceaccount/token)
        and not trusted_kubernetes_node_process
        and not_in_trusted_namespace
      output: >
        Kubernetes sensitive file accessed by unexpected process
        (user=%user.name command=%proc.cmdline file=%fd.name
        namespace=%k8s.ns.name pod=%k8s.pod.name container=%container.name
        image=%container.image.repository:%container.image.tag)
      priority: CRITICAL
      tags: [kubernetes, credential_access, filesystem]

