    - rule: Execution From Temp Directory In Container
      desc: Process executed from temporary directory inside a container
      condition: >
        spawned_process
        and container.id != host
        and (proc.exe startswith /tmp
             or proc.exe startswith /var/tmp
             or proc.exe startswith /dev/shm
             or evt.arg.filename startswith /tmp
             or evt.arg.filename startswith /var/tmp
             or evt.arg.filename startswith /dev/shm
             or proc.exepath startswith /tmp
             or proc.exepath startswith /var/tmp
             or proc.exepath startswith /dev/shm)
        and not_in_trusted_namespace
      output: >
        Process executed from temp directory in container
        (user=%user.name command=%proc.cmdline exe=%proc.exepath parent=%proc.pcmdline
        namespace=%k8s.ns.name pod=%k8s.pod.name container=%container.name
        image=%container.image.repository:%container.image.tag)
      priority: WARNING
      tags: [container, execution, suspicious_path]

    - rule: Execution From Temp Directory On Host
      desc: Process executed from temporary directory directly on host
      condition: >
        spawned_process
        and container.id = host
        and (proc.exe startswith /tmp
             or proc.exe startswith /var/tmp
             or proc.exe startswith /dev/shm
             or evt.arg.filename startswith /tmp
             or evt.arg.filename startswith /var/tmp
             or evt.arg.filename startswith /dev/shm
             or proc.exepath startswith /tmp
             or proc.exepath startswith /var/tmp
             or proc.exepath startswith /dev/shm)
      output: >
        Process executed from temp directory on host
        (user=%user.name command=%proc.cmdline exe=%proc.exepath parent=%proc.pcmdline
        container=%container.name container_id=%container.id)
      priority: WARNING
      tags: [host, execution, suspicious_path, command_monitoring]

    - rule: Sensitive Persistence File Modified In Container
      desc: Sensitive persistence-related file modified inside a container
      condition: >
        open_write
        and container.id != host
        and (fd.name startswith /etc/cron
             or fd.name startswith /etc/systemd/system
             or fd.name contains /.ssh/authorized_keys
             or fd.name = /etc/ld.so.preload
             or fd.name = /etc/profile
             or fd.name = /etc/bash.bashrc)
        and not_in_trusted_namespace
      output: >
        Sensitive persistence file modified in container
        (user=%user.name command=%proc.cmdline file=%fd.name
        namespace=%k8s.ns.name pod=%k8s.pod.name container=%container.name
        image=%container.image.repository:%container.image.tag)
      priority: CRITICAL
      tags: [container, persistence, filesystem, mitre_persistence]

    - rule: Sensitive Persistence File Modified On Host
      desc: Sensitive persistence-related file modified directly on host
      condition: >
        open_write
        and container.id = host
        and (fd.name startswith /etc/cron
             or fd.name startswith /etc/systemd/system
             or fd.name contains /.ssh/authorized_keys
             or fd.name = /etc/ld.so.preload
             or fd.name = /etc/profile
             or fd.name = /etc/bash.bashrc)
      output: >
        Sensitive persistence file modified on host
        (user=%user.name command=%proc.cmdline file=%fd.name
        container=%container.name container_id=%container.id)
      priority: CRITICAL
      tags: [host, persistence, filesystem, command_monitoring]

