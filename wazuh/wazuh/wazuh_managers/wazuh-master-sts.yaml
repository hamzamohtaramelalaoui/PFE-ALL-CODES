              <!-- END MANAGED FALCO RULES -->
              
              
              <!-- BEGIN MANAGED KUBERNETES AUDIT RULES -->

              <group name="kubernetes,audit,">

                <!-- Base Kubernetes audit event -->
                <rule id="120000" level="0">
                  <decoded_as>json</decoded_as>
                  <field name="apiVersion">audit.k8s.io/v1</field>
                  <description>Kubernetes audit event</description>
                </rule>

                <!-- kubectl exec / attach / port-forward -->
                <rule id="120010" level="10">
                  <if_sid>120000</if_sid>
                  <field name="verb">create</field>
                  <field name="objectRef.subresource">exec|attach|portforward</field>
                  <description>Kubernetes interactive access: $(objectRef.subresource) on $(objectRef.resource)/$(objectRef.name) by $(user.username)</description>
                  <group>kubernetes_audit,interactive_access,</group>
                </rule>

                <!-- Secret read -->
                <rule id="120020" level="12">
                  <if_sid>120000</if_sid>
                  <field name="verb">get|list|watch</field>
                  <field name="objectRef.resource">secrets</field>
                  <description>Kubernetes secret access by $(user.username): $(verb) secret $(objectRef.namespace)/$(objectRef.name)</description>
                  <group>kubernetes_audit,secrets,credential_access,</group>
                </rule>

                <!-- Secret create/update/delete -->
                <rule id="120021" level="12">
                  <if_sid>120000</if_sid>
                  <field name="verb">create|update|patch|delete|deletecollection</field>
                  <field name="objectRef.resource">secrets</field>
                  <description>Kubernetes secret modified by $(user.username): $(verb) $(objectRef.namespace)/$(objectRef.name)</description>
                  <group>kubernetes_audit,secrets,</group>
                </rule>

                <!-- ConfigMap modified -->
                <rule id="120030" level="8">
                  <if_sid>120000</if_sid>
                  <field name="verb">create|update|patch|delete|deletecollection</field>
                  <field name="objectRef.resource">configmaps</field>
                  <description>Kubernetes ConfigMap modified by $(user.username): $(verb) $(objectRef.namespace)/$(objectRef.name)</description>
                  <group>kubernetes_audit,configmaps,</group>
                </rule>

                <!-- Workload changed -->
                <rule id="120040" level="8">
                  <if_sid>120000</if_sid>
                  <field name="verb">create|update|patch|delete|deletecollection</field>
                  <field name="objectRef.resource">pods|deployments|daemonsets|statefulsets|jobs|cronjobs</field>
                  <description>Kubernetes workload changed by $(user.username): $(verb) $(objectRef.resource) $(objectRef.namespace)/$(objectRef.name)</description>
                  <group>kubernetes_audit,workload_change,</group>
                </rule>

                <!-- RBAC changed -->
                <rule id="120050" level="13">
                  <if_sid>120000</if_sid>
                  <field name="verb">create|update|patch|delete|deletecollection</field>
                  <field name="objectRef.resource">roles|rolebindings|clusterroles|clusterrolebindings</field>
                  <description>Kubernetes RBAC changed by $(user.username): $(verb) $(objectRef.resource) $(objectRef.namespace)/$(objectRef.name)</description>
                  <group>kubernetes_audit,rbac,privilege_escalation,</group>
                </rule>

                <!-- Cluster-admin binding -->
                <rule id="120051" level="15">
                  <if_sid>120000</if_sid>
                  <field name="objectRef.resource">clusterrolebindings|rolebindings</field>
                  <match>cluster-admin</match>
                  <description>Kubernetes cluster-admin binding activity by $(user.username)</description>
                  <group>kubernetes_audit,rbac,cluster_admin,privilege_escalation,</group>
                </rule>

                <!-- ServiceAccount token creation -->
                <rule id="120060" level="12">
                  <if_sid>120000</if_sid>
                  <field name="verb">create</field>
                  <field name="objectRef.subresource">token</field>
                  <description>Kubernetes service account token created by $(user.username) for $(objectRef.namespace)/$(objectRef.name)</description>
                  <group>kubernetes_audit,serviceaccount,credential_access,</group>
                </rule>

                <!-- Admission denied / forbidden -->
                <rule id="120070" level="9">
                  <if_sid>120000</if_sid>
                  <field name="responseStatus.code">401|403</field>
                  <description>Kubernetes API unauthorized/forbidden request by $(user.username): $(verb) $(objectRef.resource) $(objectRef.namespace)/$(objectRef.name)</description>
                  <group>kubernetes_audit,auth_failure,</group>
                </rule>

                <!-- Namespace deleted -->
                <rule id="120080" level="14">
                  <if_sid>120000</if_sid>
                  <field name="verb">delete</field>
                  <field name="objectRef.resource">namespaces</field>
                  <description>Kubernetes namespace deleted by $(user.username): $(objectRef.name)</description>
                  <group>kubernetes_audit,destructive,namespace,</group>
                </rule>

              </group>

              <!-- END MANAGED KUBERNETES AUDIT RULES -->
              
              
              EOF

              sed -i 's/^              //' "$tmp_file"
              cp "$tmp_file" "$rules_file"
              chown 0:101 "$rules_file"
              chmod 0660 "$rules_file"
          volumeMounts:
            - name: wazuh-manager-master
              mountPath: /manager-etc
              subPath: wazuh/var/ossec/etc
        - name: install-yara-local-config
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-lc"]
          args:
            - |
              set -e
              rules_file=/manager-etc/rules/local_rules.xml
              decoders_file=/manager-etc/decoders/local_decoder.xml
              tmp_rules=/tmp/local_rules.xml
              tmp_decoders=/tmp/local_decoder.xml

              mkdir -p /manager-etc/rules /manager-etc/decoders
              touch "$rules_file" "$decoders_file"

              awk '
                /<!-- BEGIN MANAGED YARA RULES -->/ { skip = 1; next }
                /<!-- END MANAGED YARA RULES -->/ { skip = 0; next }
                skip == 0 { print }
              ' "$rules_file" > "$tmp_rules"

              cat >> "$tmp_rules" <<'EOF'

              <!-- BEGIN MANAGED YARA RULES -->

              <group name="syscheck,">
                <rule id="100200" level="7">
                  <if_sid>550</if_sid>
                  <field name="file">/host/media/software</field>
                  <description>File modified in /host/media/software directory.</description>
                </rule>
                <rule id="100201" level="7">
                  <if_sid>554</if_sid>
                  <field name="file">/host/media/software</field>
                  <description>File added to /host/media/software directory.</description>
                </rule>
              </group>

              <group name="yara,">
                <rule id="108000" level="0">
                  <decoded_as>yara_decoder</decoded_as>
                  <description>YARA scan result grouping rule</description>
                  <options>no_full_log</options>
                </rule>

                <rule id="108001" level="12">
                  <if_sid>108000</if_sid>
                  <description>File "$(yara_scanned_file)" is a positive match. YARA rule: $(yara_rule)</description>
                </rule>
              </group>


              <!-- BEGIN MANAGED CLAMAV RULES -->
              <group name="clamav,malware,">
                <rule id="108100" level="0">
                  <decoded_as>clamav_decoder</decoded_as>
                  <description>ClamAV scan result grouping rule</description>
                  <options>no_full_log</options>
                </rule>

                <rule id="108101" level="12">
                  <if_sid>108100</if_sid>
                  <description>File "$(clamav_scanned_file)" is infected. ClamAV signature: $(clamav_signature)</description>
                </rule>
              </group>
              <!-- END MANAGED CLAMAV RULES -->

              <!-- END MANAGED YARA RULES -->
              EOF

              awk '
                /<!-- BEGIN MANAGED YARA DECODERS -->/ { skip = 1; next }
                /<!-- END MANAGED YARA DECODERS -->/ { skip = 0; next }
                skip == 0 { print }
              ' "$decoders_file" > "$tmp_decoders"

              cat >> "$tmp_decoders" <<'EOF'

              <!-- BEGIN MANAGED YARA DECODERS -->

              <decoder name="yara_decoder">
                <prematch type="pcre2">^wazuh-yara: INFO - Scan result:</prematch>
                <regex type="pcre2">^wazuh-yara: INFO - Scan result: ([^ ]+) (.+)$</regex>
                <order>yara_rule,yara_scanned_file</order>
              </decoder>

              <!-- BEGIN MANAGED CLAMAV DECODERS -->
              <decoder name="clamav_decoder">
                <prematch type="pcre2">^wazuh-clamav: ALERT - Scan result:</prematch>
                <regex type="pcre2">^wazuh-clamav: ALERT - Scan result: (.+): (.+) FOUND$</regex>
                <order>clamav_scanned_file,clamav_signature</order>
              </decoder>
              <!-- END MANAGED CLAMAV DECODERS -->

              <!-- END MANAGED YARA DECODERS -->
              EOF

              sed -i 's/^              //' "$tmp_rules"
              sed -i 's/^              //' "$tmp_decoders"
              cp "$tmp_rules" "$rules_file"
              cp "$tmp_decoders" "$decoders_file"
              chown 0:101 "$rules_file" "$decoders_file"
              chmod 0660 "$rules_file" "$decoders_file"
          volumeMounts:
            - name: wazuh-manager-master
              mountPath: /manager-etc
              subPath: wazuh/var/ossec/etc
      containers:
        - name: wazuh-manager
          image: 'wazuh/wazuh-manager:4.14.5'
          resources:
            requests:
              cpu: 1
              memory: 1Gi
            limits:
              cpu: 2
              memory: 2Gi
          securityContext:
            capabilities:
              add: ["SYS_CHROOT"]
          volumeMounts:
            - name: config
              mountPath: /wazuh-config-mount/etc/ossec.conf
              subPath: master.conf
              readOnly: true
            - name: filebeat-certs
              mountPath: /etc/ssl/root-ca.pem
              readOnly: true
              subPath: root-ca.pem
            - name: filebeat-certs
              mountPath: /etc/ssl/filebeat.pem
              subPath: filebeat.pem
              readOnly: true
            - name: filebeat-certs
              mountPath: /etc/ssl/filebeat.key
              subPath: filebeat-key.pem
              readOnly: true
            - name: wazuh-authd-pass
              mountPath: /wazuh-config-mount/etc/authd.pass
              subPath: authd.pass
              readOnly: true
            - name: wazuh-manager-master
              mountPath: /var/ossec/api/configuration
              subPath: wazuh/var/ossec/api/configuration
            - name: wazuh-manager-master
              mountPath: /var/ossec/etc
              subPath: wazuh/var/ossec/etc
            - name: wazuh-manager-master
              mountPath: /var/ossec/logs
              subPath: wazuh/var/ossec/logs
            - name: wazuh-manager-master
              mountPath: /var/ossec/queue
              subPath: wazuh/var/ossec/queue
            - name: wazuh-manager-master
              mountPath: /var/ossec/var/multigroups
              subPath: wazuh/var/ossec/var/multigroups
            - name: wazuh-manager-master
              mountPath: /var/ossec/integrations
              subPath: wazuh/var/ossec/integrations
            - name: wazuh-manager-master
              mountPath: /var/ossec/active-response/bin
              subPath: wazuh/var/ossec/active-response/bin
            - name: wazuh-manager-master
              mountPath: /var/ossec/agentless
              subPath: wazuh/var/ossec/agentless
            - name: wazuh-manager-master
              mountPath: /var/ossec/wodles
              subPath: wazuh/var/ossec/wodles
            - name: wazuh-manager-master
              mountPath: /etc/filebeat
              subPath: filebeat/etc/filebeat
            - name: wazuh-manager-master
              mountPath: /var/lib/filebeat
              subPath: filebeat/var/lib/filebeat
          ports:
            - containerPort: 1515
              name: registration
            - containerPort: 1516
              name: cluster
            - containerPort: 55000
              name: api
          env:
            - name: INDEXER_URL
              value: 'https://indexer:9200'
            - name: INDEXER_USERNAME
              valueFrom:
                secretKeyRef:
                  name: indexer-cred
                  key: username
            - name: INDEXER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: indexer-cred
                  key: password
            - name: FILEBEAT_SSL_VERIFICATION_MODE
              value: 'full'
            - name: SSL_CERTIFICATE_AUTHORITIES
              value: /etc/ssl/root-ca.pem
            - name: SSL_CERTIFICATE
              value: /etc/ssl/filebeat.pem
            - name: SSL_KEY
              value: /etc/ssl/filebeat.key
            - name: API_USERNAME
              valueFrom:
                secretKeyRef:
                  name: wazuh-api-cred
                  key: username
            - name: API_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wazuh-api-cred
                  key: password
            - name: WAZUH_CLUSTER_KEY
              valueFrom:
                secretKeyRef:
                  name: wazuh-cluster-key
                  key: key
  volumeClaimTemplates:
    - metadata:
        name: wazuh-manager-master
        namespace: wazuh
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: wazuh-storage
        resources:
          requests:
            storage: 50Gi
