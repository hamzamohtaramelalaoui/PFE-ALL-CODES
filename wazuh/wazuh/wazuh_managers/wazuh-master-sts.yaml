# Wazuh master StatefulSet

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: wazuh-manager-master
  namespace: wazuh
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wazuh-manager
      node-type: master
  serviceName: wazuh-cluster
  podManagementPolicy: Parallel
  template:
    metadata:
      labels:
        app: wazuh-manager
        node-type: master
      name: wazuh-manager-master
    spec:
      volumes:
        - name: config
          configMap:
            name: wazuh-conf
        - name: filebeat-certs
          secret:
            secretName: indexer-certs
        - name: wazuh-authd-pass
          secret:
            secretName: wazuh-authd-pass
      securityContext:
        fsGroup: 101
      initContainers:
        - name: repair-ossec-etc
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-lc"]
          args:
            - |
              set -e
              mkdir -p /manager-etc/shared/default /manager-etc/rules /manager-etc/decoders
              touch /manager-etc/shared/ar.conf /manager-etc/shared/default/merged.mg
              chown -R 0:101 /manager-etc/shared /manager-etc/rules /manager-etc/decoders
              chmod 0770 /manager-etc/shared /manager-etc/shared/default
              chmod 0750 /manager-etc/rules /manager-etc/decoders
              chmod 0640 /manager-etc/shared/ar.conf
              chmod 0660 /manager-etc/shared/default/merged.mg
          volumeMounts:
            - name: wazuh-manager-master
              mountPath: /manager-etc
              subPath: wazuh/var/ossec/etc
        - name: install-custom-discord
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-lc"]
          args:
            - |
              set -e
              cat > /manager-integrations/custom-discord <<'EOF'
              #!/bin/sh
              set -u

              ALERT_FILE="${1:-}"
              WEBHOOK_URL="${3:-}"

              if [ -z "$ALERT_FILE" ] || [ ! -f "$ALERT_FILE" ]; then
                echo "custom-discord: missing alert file" >&2
                exit 1
              fi

              if [ -z "$WEBHOOK_URL" ]; then
                echo "custom-discord: missing Discord webhook URL" >&2
                exit 1
              fi

              ALERT_JSON="$(cat "$ALERT_FILE")"

              json_value() {
                echo "$ALERT_JSON" | grep -o "\"$1\":\"[^\"]*\"" | head -n1 | cut -d'"' -f4
              }

              json_number() {
                echo "$ALERT_JSON" | grep -o "\"$1\":[0-9]*" | head -n1 | cut -d':' -f2
              }

              json_escape() {
                sed \
                  -e 's/\\/\\\\/g' \
                  -e 's/"/\\"/g' \
                  -e ':a;N;$!ba;s/\r//g;s/\n/\\n/g'
              }

              RULE_ID="$(json_value id)"
              RULE_DESC="$(json_value description)"
              LEVEL="$(json_number level)"
              AGENT="$(json_value name)"
              SRCIP="$(json_value srcip)"
              FULL_LOG="$(json_value full_log)"

              MESSAGE="Wazuh Alert
              Rule: ${RULE_ID:-N/A}
              Level: ${LEVEL:-N/A}
              Description: ${RULE_DESC:-N/A}
              Agent: ${AGENT:-N/A}
              Source IP: ${SRCIP:-N/A}
              Log: ${FULL_LOG:-N/A}"

              PAYLOAD="{\"content\":\"$(printf '%s' "$MESSAGE" | json_escape)\"}"

              curl -sS \
                -H "Content-Type: application/json" \
                -X POST \
                -d "$PAYLOAD" \
                "$WEBHOOK_URL"

              exit 0
              EOF
              sed -i 's/^              //' /manager-integrations/custom-discord
              chown 0:101 /manager-integrations/custom-discord
              chmod 0750 /manager-integrations/custom-discord
          volumeMounts:
            - name: wazuh-manager-master
              mountPath: /manager-integrations
              subPath: wazuh/var/ossec/integrations
        - name: install-falco-local-rules
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-lc"]
          args:
            - |
              set -e
              rules_file=/manager-etc/rules/local_rules.xml
              tmp_file=/tmp/local_rules.xml

              mkdir -p /manager-etc/rules
              touch "$rules_file"

              awk '
                /<!-- BEGIN MANAGED FALCO RULES -->/ { skip = 1; next }
                /<!-- END MANAGED FALCO RULES -->/ { skip = 0; next }
                skip == 0 { print }
              ' "$rules_file" > "$tmp_file"

              cat >> "$tmp_file" <<'EOF'

              <!-- BEGIN MANAGED FALCO RULES -->
              <group name="falco,container_security,">

                <rule id="110099" level="0">
                  <decoded_as>json</decoded_as>
                  <field name="output_fields.k8s.ns.name">wazuh</field>
                  <description>Ignore Falco events from Wazuh namespace</description>
                  <options>no_full_log</options>
                </rule>

                <rule id="110100" level="5">
                  <decoded_as>json</decoded_as>
                  <field name="source">syscall</field>
                  <field name="priority">Warning|Critical|Error|Notice|Informational</field>
                  <description>Falco alert: $(rule)</description>
                  <options>no_full_log</options>
                </rule>

                <rule id="110101" level="12">
                  <if_sid>110100</if_sid>
                  <field name="priority">Critical</field>
                  <description>Falco critical alert: $(rule)</description>
                  <options>no_full_log</options>
                </rule>

                <rule id="110102" level="10">
                  <if_sid>110100</if_sid>
                  <field name="priority">Error</field>
                  <description>Falco error alert: $(rule)</description>
                  <options>no_full_log</options>
                </rule>

                <rule id="110103" level="8">
                  <if_sid>110100</if_sid>
                  <field name="priority">Warning</field>
                  <description>Falco warning alert: $(rule)</description>
                  <options>no_full_log</options>
                </rule>

                <rule id="110104" level="12">
                  <if_sid>110100</if_sid>
                  <field name="rule">Read sensitive file untrusted</field>
                  <description>Falco sensitive file read: $(rule)</description>
                  <options>no_full_log</options>
                </rule>

                <rule id="110105" level="12">
                  <if_sid>110100</if_sid>
                  <field name="tags">mitre_credential_access</field>
                  <description>Falco credential access behavior: $(rule)</description>
                  <options>no_full_log</options>
                </rule>
                
                <rule id="110106" level="13">
                  <if_sid>110100</if_sid>
                  <field name="rule">Java Process Spawned Shell</field>
                  <description>Falco critical: possible command injection in Java container</description>
                  <options>no_full_log</options>
                </rule>

                <rule id="110107" level="13">
                  <if_sid>110100</if_sid>
                  <field name="rule">Reverse Shell Tool Executed</field>
                  <description>Falco critical: possible reverse shell tool executed</description>
                  <options>no_full_log</options>
                </rule>

                <rule id="110108" level="13">
                  <if_sid>110100</if_sid>
                  <field name="rule">Firewall Tool Executed In Container</field>
                  <description>Falco critical: firewall tool executed in container: $(output_fields.k8s.pod.name)</description>
                  <options>no_full_log</options>
                </rule>

                <rule id="110109" level="12">
                  <if_sid>110100</if_sid>
                  <field name="rule">Sensitive Persistence File Modified</field>
                  <description>Falco critical: persistence-related file modified</description>
                  <options>no_full_log</options>
                </rule>

                <rule id="110110" level="13">
