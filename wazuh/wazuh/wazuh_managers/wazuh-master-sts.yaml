                  <options>no_full_log</options>
                </rule>

                <rule id="110153" level="13">
                  <if_sid>110103</if_sid>
                  <field name="output_fields.proc.cmdline">stratum|pool.minexmr|xmrpool|nanopool|nicehash|monerohash|supportxmr|minexmr</field>
