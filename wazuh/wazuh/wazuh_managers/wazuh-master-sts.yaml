                </rule>

                <rule id="110135" level="13">
                  <if_sid>110100</if_sid>
                  <field name="rule">Privilege Escalation Tool Executed On Host</field>
                  <description>Falco privilege escalation tool executed on host</description>
                  <options>no_full_log</options>
