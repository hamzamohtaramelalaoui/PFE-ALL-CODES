                  <options>no_full_log</options>
                </rule>
                
                <rule id="110111" level="10">
                  <if_sid>110100</if_sid>
                  <field name="rule">Network Tool Executed In App Container</field>
                  <description>Falco network tool executed in container: $(output_fields.k8s.pod.name)</description>
