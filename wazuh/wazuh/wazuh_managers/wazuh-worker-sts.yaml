# Wazuh workers StatefulSet

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: wazuh-manager-worker
  namespace: wazuh
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wazuh-manager
      node-type: worker
  serviceName: wazuh-cluster
  podManagementPolicy: Parallel
  template:
    metadata:
      labels:
        app: wazuh-manager
        node-type: worker
      name: wazuh-manager-worker
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app: wazuh-manager
                    node-type: worker
      volumes:
        - name: config
          configMap:
            name: wazuh-conf
        - name: filebeat-certs
          secret:
            secretName: indexer-certs
      securityContext:
        fsGroup: 101
      initContainers:
        - name: repair-ossec-etc
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-lc"]
          args:
            - |
              set -e
              mkdir -p /manager-etc/shared/default /manager-etc/rules /manager-etc/decoders
              touch /manager-etc/shared/ar.conf /manager-etc/shared/default/merged.mg
              chown -R 0:101 /manager-etc/shared /manager-etc/rules /manager-etc/decoders
              chmod 0770 /manager-etc/shared /manager-etc/shared/default
              chmod 0750 /manager-etc/rules /manager-etc/decoders
              chmod 0640 /manager-etc/shared/ar.conf
              chmod 0660 /manager-etc/shared/default/merged.mg
          volumeMounts:
            - name: wazuh-manager-worker
              mountPath: /manager-etc
              subPath: wazuh/var/ossec/etc
        - name: install-custom-discord
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-lc"]
          args:
            - |
              set -e
              cat > /manager-integrations/custom-discord <<'EOF'
              #!/bin/sh
              set -u

              ALERT_FILE="${1:-}"
              WEBHOOK_URL="${3:-}"

              if [ -z "$ALERT_FILE" ] || [ ! -f "$ALERT_FILE" ]; then
                echo "custom-discord: missing alert file" >&2
                exit 1
              fi

              if [ -z "$WEBHOOK_URL" ]; then
                echo "custom-discord: missing Discord webhook URL" >&2
                exit 1
              fi

              ALERT_JSON="$(cat "$ALERT_FILE")"

              json_value() {
                echo "$ALERT_JSON" | grep -o "\"$1\":\"[^\"]*\"" | head -n1 | cut -d'"' -f4
              }

              json_number() {
                echo "$ALERT_JSON" | grep -o "\"$1\":[0-9]*" | head -n1 | cut -d':' -f2
              }

              json_escape() {
                sed \
                  -e 's/\\/\\\\/g' \
                  -e 's/"/\\"/g' \
                  -e ':a;N;$!ba;s/\r//g;s/\n/\\n/g'
              }

              RULE_ID="$(json_value id)"
              RULE_DESC="$(json_value description)"
              LEVEL="$(json_number level)"
              AGENT="$(json_value name)"
              SRCIP="$(json_value srcip)"
              FULL_LOG="$(json_value full_log)"

              MESSAGE="Wazuh Alert
              Rule: ${RULE_ID:-N/A}
              Level: ${LEVEL:-N/A}
              Description: ${RULE_DESC:-N/A}
              Agent: ${AGENT:-N/A}
              Source IP: ${SRCIP:-N/A}
              Log: ${FULL_LOG:-N/A}"

              PAYLOAD="{\"content\":\"$(printf '%s' "$MESSAGE" | json_escape)\"}"

              curl -sS \
                -H "Content-Type: application/json" \
                -X POST \
                -d "$PAYLOAD" \
                "$WEBHOOK_URL"

              exit 0
              EOF
              sed -i 's/^              //' /manager-integrations/custom-discord
              chown 0:101 /manager-integrations/custom-discord
              chmod 0750 /manager-integrations/custom-discord
          volumeMounts:
            - name: wazuh-manager-worker
              mountPath: /manager-integrations
              subPath: wazuh/var/ossec/integrations
      containers:
        - name: wazuh-manager
          image: 'wazuh/wazuh-manager:4.14.5'
          resources:
            requests:
              cpu: 1
              memory: 1Gi
            limits:
              cpu: 2
              memory: 2Gi
          securityContext:
            capabilities:
              add: ["SYS_CHROOT"]
          volumeMounts:
            - name: config
              mountPath: /wazuh-config-mount/etc/ossec.conf
              subPath: worker.conf
              readOnly: true
            - name: filebeat-certs
              mountPath: /etc/ssl/root-ca.pem
              readOnly: true
              subPath: root-ca.pem
            - name: filebeat-certs
              mountPath: /etc/ssl/filebeat.pem
              subPath: filebeat.pem
              readOnly: true
            - name: filebeat-certs
              mountPath: /etc/ssl/filebeat.key
              subPath: filebeat-key.pem
              readOnly: true
            - name: wazuh-manager-worker
              mountPath: /var/ossec/api/configuration
              subPath: wazuh/var/ossec/api/configuration
            - name: wazuh-manager-worker
              mountPath: /var/ossec/etc
              subPath: wazuh/var/ossec/etc
            - name: wazuh-manager-worker
              mountPath: /var/ossec/logs
              subPath: wazuh/var/ossec/logs
            - name: wazuh-manager-worker
              mountPath: /var/ossec/queue
              subPath: wazuh/var/ossec/queue
            - name: wazuh-manager-worker
              mountPath: /var/ossec/var/multigroups
              subPath: wazuh/var/ossec/var/multigroups
            - name: wazuh-manager-worker
              mountPath: /var/ossec/integrations
              subPath: wazuh/var/ossec/integrations
            - name: wazuh-manager-worker
              mountPath: /var/ossec/active-response/bin
              subPath: wazuh/var/ossec/active-response/bin
            - name: wazuh-manager-worker
              mountPath: /var/ossec/agentless
              subPath: wazuh/var/ossec/agentless
            - name: wazuh-manager-worker
              mountPath: /var/ossec/wodles
              subPath: wazuh/var/ossec/wodles
            - name: wazuh-manager-worker
              mountPath: /etc/filebeat
              subPath: filebeat/etc/filebeat
            - name: wazuh-manager-worker
              mountPath: /var/lib/filebeat
              subPath: filebeat/var/lib/filebeat
          ports:
            - containerPort: 1514
              name: agents-events
            - containerPort: 1516
              name: cluster
          env:
            - name: INDEXER_URL
              value: 'https://indexer:9200'
            - name: INDEXER_USERNAME
              valueFrom:
                secretKeyRef:
                  name: indexer-cred
                  key: username
            - name: INDEXER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: indexer-cred
                  key: password
            - name: FILEBEAT_SSL_VERIFICATION_MODE
              value: 'full'
            - name: SSL_CERTIFICATE_AUTHORITIES
              value: /etc/ssl/root-ca.pem
            - name: SSL_CERTIFICATE
              value: /etc/ssl/filebeat.pem
            - name: SSL_KEY
              value: /etc/ssl/filebeat.key
            - name: WAZUH_CLUSTER_KEY
              valueFrom:
                secretKeyRef:
                  name: wazuh-cluster-key
                  key: key
  volumeClaimTemplates:
    - metadata:
        name: wazuh-manager-worker
        namespace: wazuh
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: wazuh-storage
        resources:
          requests:
            storage: 50Gi
